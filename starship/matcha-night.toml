# lulu-terminal: Matcha Night Starship Prompt
# 布丁的小窝 · 抹茶夜间

format = """
$username\
$os\
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$cmd_duration\
$line_break\
$character"""

[os]
disabled = false
style = "bold #8AAE5A"
[os.symbols]
Macos = " "

[username]
show_always = false
style_user = "bold #F6A6C8"
format = '[$user@]($style)'

[directory]
style = "bold #E8E0D4"
format = '[ $path ]($style)'
truncation_length = 3
truncation_symbol = "…/"
[directory.substitutions]
"Documents" = " "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
"Projects" = " "

[git_branch]
style = "bold #8AAE5A"
format = '[ $symbol $branch ]($style)'
symbol = ""

[git_status]
style = "bold #E66A7A"
format = '[$all_status$ahead_behind ]($style)'
modified = "✎"
untracked = "?"
staged = "+"
deleted = "✕"

[python]
style = "bold #F7D63A"
format = '[ $symbol ${version} ]($style)'
symbol = "🐍"
[nodejs]
style = "bold #F7D63A"
format = '[ $symbol v${version} ]($style)'
symbol = "🍮"
[rust]
style = "bold #F7D63A"
format = '[ $symbol $version ]($style)'
symbol = "🦀"

[cmd_duration]
style = "dim"
format = '[ $duration ]($style)'
min_time = 3_000

[line_break]
disabled = false

[character]
success_symbol = '[🌿 噜噜泡汤 ❯](bold #8AAE5A)'
error_symbol = '[🌿 出事了 ❯](bold #E66A7A)'
