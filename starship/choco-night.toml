# lulu-terminal: Choco Night Starship Prompt
# 布丁的小窝 · 夜间模式 · 简约可爱

format = """
$username\
$os\
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$cmd_duration\
$line_break\
$character"""

[os]
disabled = false
style = "bold yellow"

[os.symbols]
Macos = " "

[username]
show_always = false
style_user = "bold pink"
format = '[$user@]($style)'

[directory]
style = "bold yellow"
format = '[ $path ]($style)'
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = " "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
"Projects" = " "

[git_branch]
style = "bold green"
format = '[ $symbol $branch ]($style)'
symbol = ""

[git_status]
style = "bold red"
format = '[$all_status$ahead_behind ]($style)'
modified = "✎"
untracked = "?"
staged = "+"
deleted = "✕"

[python]
style = "bold yellow"
format = '[ $symbol ${version} ]($style)'
symbol = "🐍"

[nodejs]
style = "bold yellow"
format = '[ $symbol v${version} ]($style)'
symbol = "🍮"

[rust]
style = "bold yellow"
format = '[ $symbol $version ]($style)'
symbol = "🦀"

[cmd_duration]
style = "dim"
format = '[ $duration ]($style)'
min_time = 3_000

[line_break]
disabled = false

[character]
success_symbol = '[🍊 噜噜守夜 ❯](bold yellow)'
error_symbol = '[🍊 出事了 ❯](bold red)'
