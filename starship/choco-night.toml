# lulu-terminal: Choco Night Starship
# 🌙 夜间模式

format = """
$os$username$directory$git_branch$git_status$python$nodejs$rust$cmd_duration
$character"""

[os]
disabled = false
style = "bold yellow"

[os.symbols]
Macos = ""

[username]
show_always = false
style_user = "bold yellow"
format = '[$user ]($style)'

[directory]
style = "bold magenta"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "📄"
"Downloads" = "⬇️"
"Projects" = "💻"

[git_branch]
style = "bold green"
format = '[ $symbol $branch ]($style)'
symbol = ""

[git_status]
style = "bold red"
format = '[$all_status$ahead_behind ]($style)'

[python]
style = "bold yellow"
format = '[  $version ]($style)'

[nodejs]
style = "bold yellow"
format = '[  $version ]($style)'

[rust]
style = "bold yellow"
format = '[  $version ]($style)'

[cmd_duration]
style = "bold dim"
format = '[ took $duration ]($style)'
min_time = 2_000

[line_break]
disabled = false

[character]
success_symbol = '[ 🐾 ❯](bold yellow)'
error_symbol = '[ 🐾 ❯](bold red)'
